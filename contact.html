<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin-top: 200px;
            
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        form {
            margin-top: 200px;
            max-width: 600px;
            margin: auto;
        }
        /* h1 {
            margin-top: 170px;
            color: #333;
            text-align: center;
        } */
        label {
            display: block;
            
            margin-bottom: 8px;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #3947ea;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: grey;
        }
        nav {
            text-align: center; 
        
        }
        
        nav li {
            display: inline-block; 
            margin-right: 40px; 
            
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Triveni</h1>
        <nav>
            
            <li><a href="./index.html"><h1><b>Home</b></h1></a></li>
            <li><a href="./skills.html"><b><h1>Skills</b></h1></a></li>
            <li><a href="./learning.html"><b><h1>Learning</b></h1></a></li>
        </nav>

    </div>

    <div class="container">
        <h1>Contact Me</h1>

        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
